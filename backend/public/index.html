<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fubabeo.mod Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
                    <div class="loading">Loading players...</div>
                </div>
            </section>
        </main>
    </div>

    <!-- Player Detail Modal -->
    <div class="modal-overlay" id="playerModal">
        <div class="modal-content">
            <button class="close-btn" id="closeModal">&times;</button>
            
            <div class="player-header">
                <img id="modalAvatar" src="" alt="Avatar" class="modal-avatar">
                <div class="player-info">
                    <h2 id="modalIgn">PlayerName</h2>
                    <p id="modalServer" class="server-badge">Server IP</p>
                    <div class="tracking-toggle">
                        <label class="switch">
                          <input type="checkbox" id="liveTrackingToggle">
                          <span class="slider round"></span>
                        </label>
                        <span id="trackingStatusText">Live Tracking: OFF</span>
                    </div>
                </div>
                <button id="clearDataBtn" class="clear-data-btn">🗑️ Xóa Dữ Liệu</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="latest">📍 Vị Trí</button>
                <button class="tab-btn" data-tab="blocks_online">📦 Block (Online)</button>
                <button class="tab-btn" data-tab="blocks_offline">📦 Block (Offline)</button>
                <button class="tab-btn" data-tab="proximity">👥 Ai Ở Gần</button>
            </div>

            <div class="tab-content">
                <!-- Tab 1: Vị Trí -->
                <div class="tab-pane active" id="tab-latest">
                    <!-- Populated by JS -->
                </div>

                <!-- Tab 2: Block (Online) -->
                <div class="tab-pane" id="tab-blocks_online">
                    <!-- Populated by JS -->
                </div>

                <!-- Tab 3: Block (Offline) -->
                <div class="tab-pane" id="tab-blocks_offline">
                    <!-- Populated by JS -->
                </div>

                <!-- Tab 4: Ai Ở Gần -->
                <div class="tab-pane" id="tab-proximity">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
